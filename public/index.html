<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wayfare — Travel Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --ink: #1a1a2e; --ink-soft: #4a4a6a; --ink-muted: #8888aa;
    --surface: #faf9f7; --surface-raised: #ffffff;
    --border: rgba(26,26,46,0.1); --border-strong: rgba(26,26,46,0.2);
    --accent: #c4602a; --accent-light: #f5ede6;
    --radius: 16px;
    --font-display: 'Playfair Display', Georgia, serif;
    --font-body: 'DM Sans', sans-serif;
  }
  body { font-family: var(--font-body); background: var(--surface); color: var(--ink); min-height: 100vh; line-height: 1.6; }

  .hero { background: var(--ink); padding: 3rem 2rem 4rem; text-align: center; position: relative; overflow: hidden; }
  .hero::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse 80% 60% at 50% 120%, rgba(196,96,42,0.25) 0%, transparent 70%); pointer-events: none; }
  .hero-label { font-size: 11px; letter-spacing: 0.25em; text-transform: uppercase; color: var(--accent); font-weight: 500; margin-bottom: 1rem; }
  .hero h1 { font-family: var(--font-display); font-size: clamp(2.4rem, 6vw, 4rem); color: #fff; font-weight: 400; line-height: 1.1; margin-bottom: 0.75rem; }
  .hero h1 em { font-style: italic; color: #e8c99a; }
  .hero p { color: rgba(255,255,255,0.55); font-size: 1rem; font-weight: 300; max-width: 400px; margin: 0 auto; }

  .tabs-wrapper { background: var(--ink); padding: 0 2rem; display: flex; justify-content: center; }
  .tabs { display: flex; border-top: 1px solid rgba(255,255,255,0.08); max-width: 540px; width: 100%; }
  .tab-btn { flex: 1; background: none; border: none; color: rgba(255,255,255,0.4); font-family: var(--font-body); font-size: 0.8rem; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; padding: 1rem 0.5rem; cursor: pointer; border-top: 2px solid transparent; margin-top: -1px; transition: color 0.2s, border-color 0.2s; }
  .tab-btn.active { color: #fff; border-top-color: var(--accent); }

  .main { max-width: 640px; margin: 0 auto; padding: 2.5rem 1.5rem 4rem; }

  .card { background: var(--surface-raised); border: 1px solid var(--border); border-radius: var(--radius); padding: 2rem; margin-bottom: 1.5rem; }
  .card-title { font-family: var(--font-display); font-size: 1.1rem; font-weight: 600; color: var(--ink); margin-bottom: 1.5rem; }

  .field { margin-bottom: 1.25rem; }
  .field label { display: block; font-size: 0.75rem; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-muted); margin-bottom: 0.5rem; }
  .select-wrap { position: relative; }
  .select-wrap::after { content: '▾'; position: absolute; right: 1rem; top: 50%; transform: translateY(-50%); color: var(--ink-muted); pointer-events: none; font-size: 0.85rem; }
  select { width: 100%; appearance: none; background: var(--surface); border: 1px solid var(--border-strong); border-radius: 10px; padding: 0.75rem 2.5rem 0.75rem 1rem; font-family: var(--font-body); font-size: 0.95rem; color: var(--ink); cursor: pointer; transition: border-color 0.2s; }
  select:focus { outline: none; border-color: var(--accent); }

  .btn { width: 100%; background: var(--accent); color: #fff; border: none; border-radius: 10px; padding: 0.9rem 1.5rem; font-family: var(--font-body); font-size: 0.95rem; font-weight: 500; cursor: pointer; transition: opacity 0.2s; margin-top: 0.5rem; }
  .btn:hover { opacity: 0.9; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-blue { background: #2a6b8a; }

  .loading { display: none; text-align: center; padding: 3rem 1.5rem; color: var(--ink-muted); }
  .loading.visible { display: block; }
  .spinner { width: 36px; height: 36px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 1rem; }
  .spinner-blue { border-top-color: #2a6b8a; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-box { display:none; background:#fff5f5; border:1px solid #ffc0c0; border-radius:10px; padding:12px 16px; color:#842029; font-size:13px; margin-top:12px; }
  .error-box.visible { display:block; }

  .result-card { background:#fff; border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; margin-top:8px; }
  .result-header { background:var(--ink); padding:20px 24px; display:flex; align-items:center; gap:16px; }
  .result-header-blue { background:#2a6b8a; }
  .result-flag { font-size:2rem; line-height:1; }
  .result-title { color:#fff; font-weight:600; font-size:15px; }
  .result-subtitle { color:rgba(255,255,255,0.5); font-size:12px; margin-top:2px; }
  .result-body { padding:24px; font-size:14px; color:#3a3a5a; line-height:1.7; }
  .result-body h3 { font-family:var(--font-display); font-size:14px; font-weight:700; color:var(--ink); margin:18px 0 8px; }
  .result-body h3:first-child { margin-top:0; }
  .result-body ul { padding-left:20px; margin:6px 0 12px; }
  .result-body li { margin-bottom:5px; }
  .result-body a { color:var(--accent); }
  .result-body blockquote { border-left:3px solid var(--accent); padding:8px 12px; background:#fdf6f2; border-radius:4px; margin:12px 0; font-size:12px; color:#666; }
  .result-disclaimer { margin-top:16px; font-size:11px; color:#aaa; font-style:italic; border-top:1px solid #eee; padding-top:12px; }

  .panel { display: none; }
  .panel.active { display: block; }
  .section-divider { text-align:center; color:var(--ink-muted); font-size:0.75rem; letter-spacing:0.1em; text-transform:uppercase; padding:0.5rem 0 1.5rem; }

  @media (max-width: 480px) {
    .hero { padding: 2rem 1.25rem 3rem; }
    .card { padding: 1.5rem; }
    .result-body { padding: 1.25rem; }
  }
</style>
</head>
<body>

<div class="hero">
  <p class="hero-label">Wayfare</p>
  <h1>Travel <em>smarter,</em><br>go further</h1>
  <p>Instant visa requirements and personalised destination ideas, powered by AI.</p>
</div>

<div class="tabs-wrapper">
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('requirements', this)">Visa Requirements</button>
    <button class="tab-btn" onclick="switchTab('recommend', this)">Destination Ideas</button>
  </div>
</div>

<div class="main">

  <!-- TAB 1 -->
  <div class="panel active" id="panel-requirements">
    <div class="card">
      <p class="card-title">Where are you going?</p>
      <div class="field">
        <label>Your nationality / passport</label>
        <div class="select-wrap">
          <select id="req-nationality"><option value="">Select your passport...</option></select>
        </div>
      </div>
      <div class="field">
        <label>Destination country</label>
        <div class="select-wrap">
          <select id="req-destination"><option value="">Select destination...</option></select>
        </div>
      </div>
      <button class="btn" id="req-btn" onclick="checkRequirements()">Check requirements</button>
    </div>
    <div class="loading" id="req-loading"><div class="spinner"></div><p style="font-size:13px;font-style:italic;">Consulting travel intelligence...</p></div>
    <div class="error-box" id="req-error"></div>
    <div id="req-results"></div>
  </div>

  <!-- TAB 2 -->
  <div class="panel" id="panel-recommend">
    <div class="card">
      <p class="card-title">Find your next destination</p>
      <div class="field">
        <label>Your nationality / passport</label>
        <div class="select-wrap">
          <select id="rec-nationality"><option value="">Select your passport...</option></select>
        </div>
      </div>
      <div class="field">
        <label>Travel vibe <span style="color:#aaa;font-weight:400;text-transform:none;letter-spacing:0;font-size:0.8rem;">(optional)</span></label>
        <div class="select-wrap">
          <select id="rec-vibe">
            <option value="">Any — surprise me</option>
            <option value="beach & relaxation">Beach & relaxation</option>
            <option value="culture & history">Culture & history</option>
            <option value="adventure & outdoors">Adventure & outdoors</option>
            <option value="food & nightlife">Food & nightlife</option>
            <option value="budget travel">Budget travel</option>
            <option value="luxury">Luxury</option>
            <option value="family friendly">Family friendly</option>
            <option value="solo travel">Solo travel</option>
          </select>
        </div>
      </div>
      <button class="btn btn-blue" id="rec-btn" onclick="getRecommendations()">Find destinations</button>
    </div>
    <div class="loading" id="rec-loading"><div class="spinner spinner-blue"></div><p style="font-size:13px;font-style:italic;">Curating your travel options...</p></div>
    <div class="error-box" id="rec-error"></div>
    <div id="rec-results"></div>
  </div>

</div>

<script>
const COUNTRIES = [
  {name:"Afghanistan",flag:"🇦🇫"},{name:"Albania",flag:"🇦🇱"},{name:"Algeria",flag:"🇩🇿"},
  {name:"Argentina",flag:"🇦🇷"},{name:"Armenia",flag:"🇦🇲"},{name:"Australia",flag:"🇦🇺"},
  {name:"Austria",flag:"🇦🇹"},{name:"Azerbaijan",flag:"🇦🇿"},{name:"Bahrain",flag:"🇧🇭"},
  {name:"Bangladesh",flag:"🇧🇩"},{name:"Belarus",flag:"🇧🇾"},{name:"Belgium",flag:"🇧🇪"},
  {name:"Bhutan",flag:"🇧🇹"},{name:"Bolivia",flag:"🇧🇴"},{name:"Brazil",flag:"🇧🇷"},
  {name:"Bulgaria",flag:"🇧🇬"},{name:"Cambodia",flag:"🇰🇭"},{name:"Cameroon",flag:"🇨🇲"},
  {name:"Canada",flag:"🇨🇦"},{name:"Chile",flag:"🇨🇱"},{name:"China",flag:"🇨🇳"},
  {name:"Colombia",flag:"🇨🇴"},{name:"Costa Rica",flag:"🇨🇷"},{name:"Croatia",flag:"🇭🇷"},
  {name:"Cuba",flag:"🇨🇺"},{name:"Cyprus",flag:"🇨🇾"},{name:"Czech Republic",flag:"🇨🇿"},
  {name:"Denmark",flag:"🇩🇰"},{name:"Ecuador",flag:"🇪🇨"},{name:"Egypt",flag:"🇪🇬"},
  {name:"Estonia",flag:"🇪🇪"},{name:"Ethiopia",flag:"🇪🇹"},{name:"Fiji",flag:"🇫🇯"},
  {name:"Finland",flag:"🇫🇮"},{name:"France",flag:"🇫🇷"},{name:"Georgia",flag:"🇬🇪"},
  {name:"Germany",flag:"🇩🇪"},{name:"Ghana",flag:"🇬🇭"},{name:"Greece",flag:"🇬🇷"},
  {name:"Hungary",flag:"🇭🇺"},{name:"Iceland",flag:"🇮🇸"},{name:"India",flag:"🇮🇳"},
  {name:"Indonesia",flag:"🇮🇩"},{name:"Iran",flag:"🇮🇷"},{name:"Iraq",flag:"🇮🇶"},
  {name:"Ireland",flag:"🇮🇪"},{name:"Israel",flag:"🇮🇱"},{name:"Italy",flag:"🇮🇹"},
  {name:"Jamaica",flag:"🇯🇲"},{name:"Japan",flag:"🇯🇵"},{name:"Jordan",flag:"🇯🇴"},
  {name:"Kazakhstan",flag:"🇰🇿"},{name:"Kenya",flag:"🇰🇪"},{name:"Kuwait",flag:"🇰🇼"},
  {name:"Latvia",flag:"🇱🇻"},{name:"Lebanon",flag:"🇱🇧"},{name:"Lithuania",flag:"🇱🇹"},
  {name:"Luxembourg",flag:"🇱🇺"},{name:"Malaysia",flag:"🇲🇾"},{name:"Maldives",flag:"🇲🇻"},
  {name:"Malta",flag:"🇲🇹"},{name:"Mexico",flag:"🇲🇽"},{name:"Mongolia",flag:"🇲🇳"},
  {name:"Montenegro",flag:"🇲🇪"},{name:"Morocco",flag:"🇲🇦"},{name:"Myanmar",flag:"🇲🇲"},
  {name:"Nepal",flag:"🇳🇵"},{name:"Netherlands",flag:"🇳🇱"},{name:"New Zealand",flag:"🇳🇿"},
  {name:"Nigeria",flag:"🇳🇬"},{name:"Norway",flag:"🇳🇴"},{name:"Oman",flag:"🇴🇲"},
  {name:"Pakistan",flag:"🇵🇰"},{name:"Panama",flag:"🇵🇦"},{name:"Peru",flag:"🇵🇪"},
  {name:"Philippines",flag:"🇵🇭"},{name:"Poland",flag:"🇵🇱"},{name:"Portugal",flag:"🇵🇹"},
  {name:"Qatar",flag:"🇶🇦"},{name:"Romania",flag:"🇷🇴"},{name:"Russia",flag:"🇷🇺"},
  {name:"Rwanda",flag:"🇷🇼"},{name:"Saudi Arabia",flag:"🇸🇦"},{name:"Senegal",flag:"🇸🇳"},
  {name:"Serbia",flag:"🇷🇸"},{name:"Singapore",flag:"🇸🇬"},{name:"Slovakia",flag:"🇸🇰"},
  {name:"Slovenia",flag:"🇸🇮"},{name:"South Africa",flag:"🇿🇦"},{name:"South Korea",flag:"🇰🇷"},
  {name:"Spain",flag:"🇪🇸"},{name:"Sri Lanka",flag:"🇱🇰"},{name:"Sweden",flag:"🇸🇪"},
  {name:"Switzerland",flag:"🇨🇭"},{name:"Taiwan",flag:"🇹🇼"},{name:"Tanzania",flag:"🇹🇿"},
  {name:"Thailand",flag:"🇹🇭"},{name:"Tunisia",flag:"🇹🇳"},{name:"Turkey",flag:"🇹🇷"},
  {name:"Uganda",flag:"🇺🇬"},{name:"Ukraine",flag:"🇺🇦"},{name:"United Arab Emirates",flag:"🇦🇪"},
  {name:"United Kingdom",flag:"🇬🇧"},{name:"United States",flag:"🇺🇸"},{name:"Uruguay",flag:"🇺🇾"},
  {name:"Uzbekistan",flag:"🇺🇿"},{name:"Venezuela",flag:"🇻🇪"},{name:"Vietnam",flag:"🇻🇳"},
  {name:"Zambia",flag:"🇿🇲"},{name:"Zimbabwe",flag:"🇿🇼"}
];

function populateSelects() {
  ['req-nationality','req-destination','rec-nationality'].forEach(id => {
    const el = document.getElementById(id);
    COUNTRIES.forEach(c => {
      const opt = document.createElement('option');
      opt.value = c.name;
      opt.textContent = c.flag + '  ' + c.name;
      el.appendChild(opt);
    });
  });
}

function switchTab(tab, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('panel-' + tab).classList.add('active');
}

function getFlagForCountry(name) {
  const c = COUNTRIES.find(x => x.name === name);
  return c ? c.flag : '🌍';
}

function setLoading(prefix, on) {
  document.getElementById(prefix+'-loading').classList.toggle('visible', on);
  document.getElementById(prefix+'-btn').disabled = on;
  document.getElementById(prefix+'-error').classList.remove('visible');
  if (on) document.getElementById(prefix+'-results').innerHTML = '';
}

function showError(prefix, msg) {
  const el = document.getElementById(prefix+'-error');
  el.textContent = msg;
  el.classList.add('visible');
}

function markdownToHtml(text) {
  const lines = text.split('\n');
  let html = '';
  let inList = false;
  for (let raw of lines) {
    let line = raw
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g, '<em>$1</em>')
      .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
    if (/^---+$/.test(line.trim())) continue;
    if (/^#{1,3} (.+)/.test(line)) {
      if (inList) { html += '</ul>'; inList = false; }
      html += '<h3>' + line.replace(/^#{1,3} /, '') + '</h3>';
    } else if (/^> (.+)/.test(line)) {
      if (inList) { html += '</ul>'; inList = false; }
      html += '<blockquote>' + line.replace(/^> /, '') + '</blockquote>';
    } else if (/^[*\-•] (.+)/.test(line)) {
      if (!inList) { html += '<ul>'; inList = true; }
      html += '<li>' + line.replace(/^[*\-•] /, '') + '</li>';
    } else if (line.trim() === '') {
      if (inList) { html += '</ul>'; inList = false; }
    } else {
      if (inList) { html += '</ul>'; inList = false; }
      html += '<p>' + line + '</p>';
    }
  }
  if (inList) html += '</ul>';
  return html;
}

async function callBackend(prompt) {
  const response = await fetch('/api/chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ prompt })
  });
  const data = await response.json();
  if (!response.ok) throw new Error(data.error || 'Request failed');
  return data.result;
}

async function checkRequirements() {
  const nat = document.getElementById('req-nationality').value;
  const dest = document.getElementById('req-destination').value;
  if (!nat || !dest) { alert('Please select both your nationality and a destination.'); return; }
  if (nat === dest) { alert('Nationality and destination are the same!'); return; }
  setLoading('req', true);
  try {
    const result = await callBackend(
      `You are a travel information assistant. A ${nat} passport holder wants to visit ${dest}.\n\nProvide practical visa and entry information with these sections:\n### Visa Requirement\n### Maximum Stay\n### Documents Needed\n### Health Requirements\n### Key Tips\n### Verify At\n\nBe concise and practical. Use bullet points. Note requirements can change and travellers should verify with the official embassy.`
    );
    document.getElementById('req-results').innerHTML =
      '<div class="section-divider">Results</div>' +
      '<div class="result-card">' +
        '<div class="result-header">' +
          '<span class="result-flag">' + getFlagForCountry(dest) + '</span>' +
          '<div><p class="result-title">' + nat + ' → ' + dest + '</p>' +
          '<p class="result-subtitle">Visa & entry requirements</p></div>' +
        '</div>' +
        '<div class="result-body">' + markdownToHtml(result) +
          '<p class="result-disclaimer">Always verify with the official embassy before travel.</p>' +
        '</div></div>';
  } catch(e) {
    showError('req', 'Error: ' + e.message);
  } finally {
    setLoading('req', false);
  }
}

async function getRecommendations() {
  const nat = document.getElementById('rec-nationality').value;
  const vibe = document.getElementById('rec-vibe').value;
  if (!nat) { alert('Please select your nationality.'); return; }
  setLoading('rec', true);
  const vibeText = vibe ? ` with a focus on ${vibe}` : '';
  try {
    const result = await callBackend(
      `Suggest 3 excellent travel destinations for a ${nat} passport holder${vibeText}. Return ONLY a JSON array:\n[\n  {\n    "country": "Japan",\n    "flag": "🇯🇵",\n    "tagline": "short punchy hook",\n    "why": "2 sentences why great for this nationality",\n    "visa": "visa situation in one line",\n    "bestTime": "e.g. March–May",\n    "mustDo": "one unmissable experience"\n  }\n]`
    );
    const clean = result.replace(/\`\`\`json|\`\`\`/g, '').trim();
    const destinations = JSON.parse(clean);
    document.getElementById('rec-results').innerHTML =
      '<div class="section-divider">Recommended for you</div>' +
      destinations.map(d =>
        '<div class="result-card" style="margin-bottom:1rem;">' +
          '<div class="result-header result-header-blue">' +
            '<span class="result-flag">' + d.flag + '</span>' +
            '<div><p class="result-title">' + d.country + '</p>' +
            '<p class="result-subtitle">' + d.tagline + '</p></div>' +
          '</div>' +
          '<div class="result-body">' +
            '<h3>Why go?</h3><p>' + d.why + '</p>' +
            '<h3>Visa</h3><p>' + d.visa + '</p>' +
            '<h3>Best time to visit</h3><p>' + d.bestTime + '</p>' +
            '<h3>Must-do</h3><p>' + d.mustDo + '</p>' +
          '</div></div>'
      ).join('');
  } catch(e) {
    showError('rec', 'Could not load recommendations. Please try again.');
  } finally {
    setLoading('rec', false);
  }
}

populateSelects();
</script>
</body>
</html>
